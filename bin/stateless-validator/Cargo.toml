[package]
name = "stateless-validator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
exclude.workspace = true

[[bin]]
name = "stateless-validator"
path = "src/main.rs"

[dependencies]
# alloy
alloy-genesis.workspace = true
alloy-primitives.workspace = true
alloy-rpc-types-eth.workspace = true

# op
op-alloy-rpc-types.workspace = true

# revm
revm = { workspace = true, features = ["serde"] }

# mega
salt.workspace = true

# stateless
stateless-common = { path = "../../crates/stateless-common" }
stateless-core = { path = "../../crates/stateless-core" }

# misc
bincode.workspace = true
clap = { workspace = true, features = ["env"] }
eyre.workspace = true
futures.workspace = true
metrics.workspace = true
metrics-exporter-prometheus.workspace = true
redb.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing.workspace = true

[dev-dependencies]
# misc
base64.workspace = true
jsonrpsee.workspace = true
jsonrpsee-types.workspace = true
tempfile.workspace = true
tracing-subscriber.workspace = true
zstd.workspace = true

# stateless
stateless-test-utils = { path = "../../crates/stateless-test-utils" }

[features]
test-bucket-resize = ["salt/test-bucket-resize", "stateless-core/test-bucket-resize"]
