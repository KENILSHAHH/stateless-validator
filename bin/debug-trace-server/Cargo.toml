[package]
name = "debug-trace-server"
version = "0.1.0"
edition = "2021"

[dependencies]

# Ethereum types
alloy-genesis.workspace = true
alloy-primitives.workspace = true
alloy-rpc-types-eth.workspace = true
alloy-rpc-types-trace.workspace = true

# CLI
clap.workspace = true

# Concurrent map for single-flight
dashmap = "5.5"

# Error handling
eyre.workspace = true
# RPC framework
jsonrpsee = { version = "0.24", features = ["server", "macros"] }
metrics.workspace = true
metrics-exporter-prometheus.workspace = true
op-alloy-rpc-types.workspace = true

# High-performance cache with S3-FIFO eviction
quick_cache = "0.6"

# Execution
revm.workspace = true
revm-inspectors.workspace = true
salt.workspace = true
serde.workspace = true

# Serialization
serde_json.workspace = true

# Async runtime
tokio = { workspace = true, features = ["sync"] }

# Logging and metrics
tracing.workspace = true

# Reuse validator-core
stateless-common = { path = "../../crates/stateless-common" }
validator-core = { path = "../../crates/validator-core" }

[dev-dependencies]
alloy-consensus.workspace = true
alloy-network = "1.0.23"
alloy-primitives.workspace = true
alloy-rlp.workspace = true

# Transaction signing for integration tests
alloy-signer = "1.0.23"
alloy-signer-local = "1.0.23"
dotenvy = "0.15"
# HTTP client for integration tests
reqwest = { version = "0.12", features = ["json", "blocking"] }
tempfile = "3.10"
