coverage:
  range: 60..100
  round: down
  precision: 1
  status:
    project:
      stateless-core:
        threshold: 1%
    patch:
      stateless-core:
        target: auto
        threshold: 1%
        base: auto
        only_pulls: true

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true
  hide_project_coverage: false

ignore:
  - "bin/**/*"
  - "crates/stateless-common/**/*"

fixes:
  - "/home/runner/work/stateless-validator/stateless-validator/::"
